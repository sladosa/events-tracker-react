[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  publish = "dist"
  autoLaunch = false

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["docs/help/**"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
